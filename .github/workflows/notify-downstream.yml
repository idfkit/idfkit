name: Notify downstream idfkit users
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      idfkit_version:
        required: true
        type: string
permissions:
  contents: read
jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      RAW_VERSION: ${{ inputs.idfkit_version || github.event.release.tag_name }}
      DOWNSTREAM_REPOS: |
        idfkit/idfkit-mcp
        idfkit/idfkit-lsp
        idfkit/idfkit-docs
    steps:
      - name: Normalize version (strip v prefix)
        id: ver
        run: |
          set -euo pipefail
          version="${RAW_VERSION#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Normalized version: $version"
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Trigger downstream bump workflows
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IDFKIT_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Triggering $repo"
            gh workflow run bump-idfkit.yml \
              --repo "$repo" \
              -f idfkit_version="$IDFKIT_VERSION" \
            || echo "Skipping $repo: no bump-idfkit.yml or insufficient permissions"
          done <<< "$DOWNSTREAM_REPOS"
